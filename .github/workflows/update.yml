name: Update Activity Table

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# ÇÖZÜM 1: Bota depoya yazma (commit/push) yetkisi veriyoruz
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # ÇÖZÜM 2: Sarı uyarıyı kaldırmak için v3'ü v4 yaptık
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      # ÇÖZÜM 3: Sarı uyarıyı kaldırmak için v4'ü v5 yaptık
      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Python Betiğini Çalıştır (Tabloyu Oluştur)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_readme.py

      - name: Değişiklikleri Kaydet ve Gönder (Commit & Push)
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 README dinamik tablo güncellendi" && git push)
