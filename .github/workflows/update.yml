name: Update Activity Table

on:
  schedule:
    - cron: '0 0 * * *' # Her gece saat 00:00'da çalışır
  workflow_dispatch: # Actions sekmesinden manuel tetiklemene olanak tanır

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Python Betiğini Çalıştır (Tabloyu Oluştur)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_readme.py

      - name: Değişiklikleri Kaydet ve Gönder (Commit & Push)
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add README.md
          # Sadece değişiklik varsa commit at, yoksa hata verme
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 README dinamik tablo güncellendi" && git push)
